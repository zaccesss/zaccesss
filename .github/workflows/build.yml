name: README build

# I run this every 6 hours to keep my stats fresh, on every push to main,
# and I can also trigger it manually from the Actions tab when I need it.
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

# I need write access so the job can push the regenerated SVGs back to my repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out my repo so the workflow has access to my files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # I'm using Python 3.12 to run my SVG generator script.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip downloads so my builds are faster on repeat runs.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Install everything my generator script needs.
      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Run my generator — it pulls live GitHub stats and writes dark_mode.svg and light_mode.svg.
      # ACCESS_TOKEN lives in: Settings > Secrets and variables > Actions > New repository secret
      # It needs read access to my repositories and account so it can fetch stats.
      - name: Generate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: zaccesss
        run: python isaacadjei.py

      # Commit the freshly generated SVGs back to my repo under my own name.
      # The diff check means I only commit when something actually changed.
      # I push to GitHub first (using the token actions/checkout already configured),
      # then mirror the same HEAD to GitLab and Codeberg by pushing directly to their URLs.
      # Using set-url --add --push would drop GitHub from the push list, so I avoid it here.
      - name: Commit and push updated SVGs
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git config --global user.email "offices.isaac@gmail.com"
          git config --global user.name "Isaac Adjei"
          git add dark_mode.svg light_mode.svg
          git diff --staged --quiet || git commit -m "chore: update profile SVG"
          git push origin HEAD:main
          git push "https://zaccesss:${GITLAB_TOKEN}@gitlab.com/zaccesss/zaccesss.git" HEAD:main
          git push "https://zaccesss:${CODEBERG_TOKEN}@codeberg.org/zaccesss/zaccesss.git" HEAD:main
