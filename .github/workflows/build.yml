name: README build

# I run this every 6 hours to keep my stats fresh, on every push to main,
# and I can also trigger it manually from the Actions tab when I need it.
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

# I need write access so the job can push the regenerated SVGs back to my repo.
permissions:
  contents: write

# Only one build runs at a time. Overlapping runs regenerate the same two SVGs
# and would otherwise race each other's push; queueing them avoids that.
concurrency:
  group: readme-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out my repo so the workflow has access to my files.
      # fetch-depth: 0 gives a full clone — Gitea rejects shallow pushes to new repos.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # I'm using Python 3.12 to run my SVG generator script.
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Cache pip downloads so my builds are faster on repeat runs.
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Install everything my generator script needs.
      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Run my generator — it pulls live GitHub stats and writes dark_mode.svg and light_mode.svg.
      # ACCESS_TOKEN lives in: Settings > Secrets and variables > Actions > New repository secret
      # It needs read access to my repositories and account so it can fetch stats.
      - name: Generate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: zaccesss
        run: python isaacadjei.py

      # Commit the freshly generated SVGs back to my repo under my own name.
      # The diff check means I only commit when something actually changed.
      # I push to GitHub (using the token actions/checkout already configured);
      # mirroring to the other forges is handled server-side by mirror-ops.
      - name: Commit and push updated SVGs
        run: |
          git config --global user.email "190771985+zaccesss@users.noreply.github.com"
          git config --global user.name "Isaac Adjei"
          git add dark_mode.svg light_mode.svg
          if git diff --staged --quiet; then
            echo "SVGs unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore: update profile SVG"
          # If the remote moved ahead while we were running, replant our freshly
          # generated SVGs on top of the new tip and retry. We regenerate the whole
          # SVG each run, so ours is the authoritative newest version — 'reset --soft'
          # onto origin/main re-commits our files cleanly with no line-level conflict.
          # 'if git push' keeps a failed push from tripping 'set -e' mid-loop.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=true; break; fi
            echo "Push rejected (attempt ${attempt}); replanting SVGs on latest origin/main..."
            git fetch origin main
            git reset --soft origin/main
            if git diff --staged --quiet; then
              echo "Remote already matches our SVGs; nothing to push."
              pushed=true
              break
            fi
            git commit -m "chore: update profile SVG"
          done
          if [ "$pushed" != true ]; then
            echo "::error::Failed to push updated SVGs after 5 attempts."
            exit 1
          fi
          # Mirroring to GitLab, Codeberg, Bitbucket and Gitea is handled
          # server-side by the mirror-ops setup, so no mirror pushes happen here.
