# Lightweight CI so a broken change cannot land. I compile and import check my
# generator scripts. There is no build step, they are plain scripts, so this is quick.

name: CI

on:
  # Pull requests only. CI does not need to re-run on main after a PR merges (the same
  # commit was already checked on the PR), and the SVG commits the build pushes to main
  # are not code changes worth checking.
  pull_request:

# Least privilege, I only read the repository.
permissions:
  contents: read

jobs:
  script:
    name: Build script (Python)
    runs-on: ubuntu-latest
    steps:
      # I check out the repository.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # I set up Python 3.12, the same version my build workflow runs on.
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      # I install my dependencies so the import check below is a real check.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # I byte compile each script to catch syntax errors, then import it to catch
      # import and wiring errors. The token is only read inside main() under the
      # __main__ guard, so this import needs no secret.
      - name: Compile and import check
        run: |
          python -m compileall -q profile.py approach.py
          python -c "import profile"
          python -c "import approach"
