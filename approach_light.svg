<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg"
     font-family="ConsolasFallback,Consolas,monospace"
     width="985px" height="280px"
     font-size="15px">
  <defs>
    <style>
      @font-face {
        src: local('Consolas'), local('Consolas Bold');
        font-family: 'ConsolasFallback';
        font-display: swap;
        size-adjust: 109%;
      }
      text, tspan { white-space: pre; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 0.7s step-end infinite; }
      .comment { fill: #6e7781; }
      .kw      { fill: #cf222e; }
      .type    { fill: #953800; }
      .fn      { fill: #8250df; }
      .str     { fill: #0a3069; }
      .plain   { fill: #24292f; }
    </style>

    <clipPath id="lc1"><rect x="30" y="30" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.0192;0.0538;0.8815;0.8816;1" values="0;0;145;145;0;0"/>
    </rect></clipPath>

    <clipPath id="lc2"><rect x="30" y="58" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.0538;0.1069;0.8815;0.8816;1" values="0;0;220;220;0;0"/>
    </rect></clipPath>

    <clipPath id="lc3"><rect x="30" y="82" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.1069;0.1600;0.8815;0.8816;1" values="0;0;220;220;0;0"/>
    </rect></clipPath>

    <clipPath id="lc4"><rect x="30" y="110" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.1600;0.2338;0.8815;0.8816;1" values="0;0;305;305;0;0"/>
    </rect></clipPath>

    <clipPath id="lc5"><rect x="30" y="134" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.2338;0.3331;0.8815;0.8816;1" values="0;0;410;410;0;0"/>
    </rect></clipPath>

    <clipPath id="lc6"><rect x="30" y="158" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.3331;0.4277;0.8815;0.8816;1" values="0;0;390;390;0;0"/>
    </rect></clipPath>

    <clipPath id="lc7"><rect x="30" y="182" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.4277;0.4300;0.8815;0.8816;1" values="0;0;15;15;0;0"/>
    </rect></clipPath>

    <clipPath id="lc8"><rect x="30" y="206" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.4300;0.5108;0.8815;0.8816;1" values="0;0;335;335;0;0"/>
    </rect></clipPath>

    <clipPath id="lc9"><rect x="30" y="230" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.5108;0.5962;0.8815;0.8816;1" values="0;0;350;350;0;0"/>
    </rect></clipPath>

    <clipPath id="lc10"><rect x="30" y="254" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.5962;0.7277;0.8815;0.8816;1" values="0;0;540;540;0;0"/>
    </rect></clipPath>
  </defs>

  <rect width="985px" height="280px" fill="#f6f8fa" rx="15"/>

  <g clip-path="url(#lc1)">
    <text x="30" y="44" class="comment">// my approach</text>
  </g>
  <g clip-path="url(#lc2)">
    <text x="30" y="72"><tspan class="type">bool</tspan><tspan class="plain"> struggling </tspan><tspan class="plain">= </tspan><tspan class="kw">true</tspan><tspan class="plain">;</tspan></text>
  </g>
  <g clip-path="url(#lc3)">
    <text x="30" y="96"><tspan class="type">bool</tspan><tspan class="plain"> failing    </tspan><tspan class="plain">= </tspan><tspan class="kw">true</tspan><tspan class="plain">;</tspan></text>
  </g>
  <g clip-path="url(#lc4)">
    <text x="30" y="124"><tspan class="kw">while</tspan><tspan class="plain"> (struggling || failing) {</tspan></text>
  </g>
  <g clip-path="url(#lc5)">
    <text x="30" y="148"><tspan class="plain">    </tspan><tspan class="fn">learn</tspan><tspan class="plain">();      </tspan><tspan class="comment">// Grow from the struggle</tspan></text>
  </g>
  <g clip-path="url(#lc6)">
    <text x="30" y="172"><tspan class="plain">    </tspan><tspan class="fn">retry</tspan><tspan class="plain">();      </tspan><tspan class="comment">// Push through failure</tspan></text>
  </g>
  <g clip-path="url(#lc7)">
    <text x="30" y="196" class="plain">}</text>
  </g>
  <g clip-path="url(#lc8)">
    <text x="30" y="220"><tspan class="fn">thrive</tspan><tspan class="plain">();         </tspan><tspan class="comment">// Embrace growth</tspan></text>
  </g>
  <g clip-path="url(#lc9)">
    <text x="30" y="244"><tspan class="fn">succeed</tspan><tspan class="plain">();        </tspan><tspan class="comment">// Achieve the goal</tspan></text>
  </g>
  <g clip-path="url(#lc10)">
    <text x="30" y="268"><tspan class="fn">printf</tspan><tspan class="plain">(</tspan><tspan class="str">"Mission accomplished.\n"</tspan><tspan class="plain">);  </tspan><tspan class="comment">// Celebrate victory</tspan><tspan class="plain cursor"> █</tspan></text>
  </g>
</svg>
