<?xml version='1.0' encoding='UTF-8'?>
<!--
  approach-dark.svg - my personal code philosophy (fixed dark palette).
  Loops every 26s: 0.5s blank, type each line at ~60ms/char, 4s hold, 3s reset.
  Each line is revealed left-to-right by animating a clipPath rect width from 0 to max.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     font-family="ConsolasFallback,Consolas,monospace"
     width="985px" height="265px"
     font-size="15px">
  <defs>
    <style>
      @font-face {
        src: local('Consolas'), local('Consolas Bold');
        font-family: 'ConsolasFallback';
        font-display: swap;
        size-adjust: 109%;
      }
      text, tspan { white-space: pre; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor  { animation: blink 0.7s step-end infinite; }
      .comment { fill: #616e7f; }
      .kw      { fill: #ff7b72; }
      .type    { fill: #ffa657; }
      .fn      { fill: #d2a8ff; }
      .str     { fill: #a5d6ff; }
      .plain   { fill: #c9d1d9; }
      .bg      { fill: #161b22; }
    </style>

    <!-- keyTimes as fractions of 26s total cycle                                      -->
    <!-- blank_end=0.0192, line ends: 0.0538,0.1069,0.1600,0.2338,0.3331,0.4277,      -->
    <!-- 0.4300,0.5108,0.5962,0.7277 — hold_end=0.8815, reset=0.8816                  -->

    <clipPath id="dc1"><rect x="30" y="15" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.0192;0.0538;0.8815;0.8816;1" values="0;0;145;145;0;0"/>
    </rect></clipPath>

    <clipPath id="dc2"><rect x="30" y="43" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.0538;0.1069;0.8815;0.8816;1" values="0;0;220;220;0;0"/>
    </rect></clipPath>

    <clipPath id="dc3"><rect x="30" y="67" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.1069;0.1600;0.8815;0.8816;1" values="0;0;220;220;0;0"/>
    </rect></clipPath>

    <clipPath id="dc4"><rect x="30" y="95" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.1600;0.2338;0.8815;0.8816;1" values="0;0;305;305;0;0"/>
    </rect></clipPath>

    <clipPath id="dc5"><rect x="30" y="119" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.2338;0.3331;0.8815;0.8816;1" values="0;0;410;410;0;0"/>
    </rect></clipPath>

    <clipPath id="dc6"><rect x="30" y="143" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.3331;0.4277;0.8815;0.8816;1" values="0;0;390;390;0;0"/>
    </rect></clipPath>

    <clipPath id="dc7"><rect x="30" y="167" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.4277;0.4300;0.8815;0.8816;1" values="0;0;15;15;0;0"/>
    </rect></clipPath>

    <clipPath id="dc8"><rect x="30" y="191" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.4300;0.5108;0.8815;0.8816;1" values="0;0;335;335;0;0"/>
    </rect></clipPath>

    <clipPath id="dc9"><rect x="30" y="215" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.5108;0.5962;0.8815;0.8816;1" values="0;0;350;350;0;0"/>
    </rect></clipPath>

    <clipPath id="dc10"><rect x="30" y="239" height="20">
      <animate attributeName="width" dur="26s" repeatCount="indefinite" calcMode="linear"
               keyTimes="0;0.5962;0.7277;0.8815;0.8816;1" values="0;0;540;540;0;0"/>
    </rect></clipPath>
  </defs>

  <rect width="985px" height="265px" class="bg" rx="15"/>

  <g clip-path="url(#dc1)">
    <text x="30" y="29" class="comment">// my approach</text>
  </g>
  <g clip-path="url(#dc2)">
    <text x="30" y="57"><tspan class="type">bool</tspan><tspan class="plain"> struggling </tspan><tspan class="plain">= </tspan><tspan class="kw">true</tspan><tspan class="plain">;</tspan></text>
  </g>
  <g clip-path="url(#dc3)">
    <text x="30" y="81"><tspan class="type">bool</tspan><tspan class="plain"> failing    </tspan><tspan class="plain">= </tspan><tspan class="kw">true</tspan><tspan class="plain">;</tspan></text>
  </g>
  <g clip-path="url(#dc4)">
    <text x="30" y="109"><tspan class="kw">while</tspan><tspan class="plain"> (struggling || failing) {</tspan></text>
  </g>
  <g clip-path="url(#dc5)">
    <text x="30" y="133"><tspan class="plain">    </tspan><tspan class="fn">learn</tspan><tspan class="plain">();      </tspan><tspan class="comment">// Grow from the struggle</tspan></text>
  </g>
  <g clip-path="url(#dc6)">
    <text x="30" y="157"><tspan class="plain">    </tspan><tspan class="fn">retry</tspan><tspan class="plain">();      </tspan><tspan class="comment">// Push through failure</tspan></text>
  </g>
  <g clip-path="url(#dc7)">
    <text x="30" y="181" class="plain">}</text>
  </g>
  <g clip-path="url(#dc8)">
    <text x="30" y="205"><tspan class="fn">thrive</tspan><tspan class="plain">();         </tspan><tspan class="comment">// Embrace growth</tspan></text>
  </g>
  <g clip-path="url(#dc9)">
    <text x="30" y="229"><tspan class="fn">succeed</tspan><tspan class="plain">();        </tspan><tspan class="comment">// Achieve the goal</tspan></text>
  </g>
  <g clip-path="url(#dc10)">
    <text x="30" y="253"><tspan class="fn">printf</tspan><tspan class="plain">(</tspan><tspan class="str">"Mission accomplished.\n"</tspan><tspan class="plain">);  </tspan><tspan class="comment">// Celebrate victory</tspan><tspan class="plain cursor"> █</tspan></text>
  </g>
</svg>
