name: README build

# I run this four times a day at 00:17, 06:17, 12:17 and 18:17 UTC to keep my stats fresh,
# on every push to main, and I can also trigger it manually from the Actions tab.
# The :17 minute keeps the run off the congested top of the hour so it is less likely
# to be delayed or dropped.
on:
  schedule:
    - cron: "17 0,6,12,18 * * *"
  push:
    branches: [main]
    # The build commits the regenerated SVGs and pushes them with a deploy key which,
    # unlike GITHUB_TOKEN, re-triggers workflows. I ignore the generated SVGs so an
    # SVG-only commit cannot start another build and loop. approach.svg itself is
    # excluded from this list since it's the hand-edited source, not generated output -
    # editing it should still trigger a build so its dark/light siblings regenerate.
    paths-ignore:
      - 'profile*.svg'
      - 'approach-dark.svg'
      - 'approach-light.svg'
  workflow_dispatch:

# I need write access so the job can push the regenerated SVG back to my repo.
permissions:
  contents: write

# Only one build runs at a time. Overlapping runs regenerate the same SVG and
# would otherwise race each other's push; queueing them avoids that.
concurrency:
  group: readme-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out my repo so the workflow has access to my files.
      # fetch-depth: 0 gives a full clone. Gitea rejects shallow pushes to new repos.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Push the SVGs over SSH with a write deploy key so the build bypasses the
          # branch ruleset that requires CI on main. Commits stay authored as me.
          ssh-key: ${{ secrets.BUILD_DEPLOY_KEY }}

      # I'm using Python 3.12 to run my SVG generator script.
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Cache pip downloads so my builds are faster on repeat runs.
      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Install everything my generator script needs.
      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Run my generator. It pulls live GitHub stats and writes profile.svg.
      # ACCESS_TOKEN lives in: Settings > Secrets and variables > Actions > New repository secret
      # It needs read access to my repositories and account so it can fetch stats.
      # CONTRIB_TOKEN is a separate classic PAT scoped to read:user only, no repo access at all.
      # GitHub's contributionsCollection withholds private-repo detail (commits, reviews, the
      # calendar) from every API caller without that scope, and no fine-grained permission grants
      # it, so this is the one place a classic PAT is unavoidable - held as narrowly as possible.
      - name: Generate the profile SVG
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          CONTRIB_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
          USER_NAME: zaccesss
        run: python profile.py

      # Derive approach-dark.svg and approach-light.svg from the hand-edited approach.svg.
      # No secrets needed - it's a pure palette split of a checked-in source file.
      - name: Generate the approach SVG variants
        run: python approach.py

      # Commit the freshly generated SVGs back to my repo under my own name.
      # The diff check means I only commit when something actually changed.
      # I push to GitHub (using the token actions/checkout already configured);
      # mirroring to the other forges is handled server-side by mirror-ops.
      - name: Commit and push the updated SVG
        env:
          SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            printf '%s\n' "$SIGNING_KEY" > ~/.sign_key && chmod 600 ~/.sign_key
            ssh-keygen -y -f ~/.sign_key > ~/.sign_key.pub
            git config --global gpg.format ssh
            git config --global user.signingkey ~/.sign_key.pub
            git config --global commit.gpgsign true
          fi
          git config --global user.email "code@isaacadjei.me"
          git config --global user.name "Isaac Adjei"
          git add profile.svg profile-dark.svg profile-light.svg approach-dark.svg approach-light.svg
          if git diff --staged --quiet; then
            echo "SVGs unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "chore: update generated SVGs"
          # If the remote moved ahead while we were running, replant our freshly
          # generated SVGs on top of the new tip and retry. We regenerate the whole
          # SVG each run, so ours is the authoritative newest version, so 'reset --soft'
          # onto origin/main re-commits our files cleanly with no line-level conflict.
          # 'if git push' keeps a failed push from tripping 'set -e' mid-loop.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=true; break; fi
            echo "Push rejected (attempt ${attempt}); replanting SVGs on latest origin/main..."
            git fetch origin main
            git reset --soft origin/main
            if git diff --staged --quiet; then
              echo "Remote already matches our SVGs; nothing to push."
              pushed=true
              break
            fi
            git commit -m "chore: update generated SVGs"
          done
          if [ "$pushed" != true ]; then
            echo "::error::Failed to push updated SVGs after 5 attempts."
            exit 1
          fi
          # Mirroring to GitLab, Codeberg, Bitbucket and Gitea is handled
          # server-side by the mirror-ops setup, so no mirror pushes happen here.
