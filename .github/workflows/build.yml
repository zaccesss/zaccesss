name: README build

on:
  # Run automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Run on every push to main (so stats update after any change)
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Allow the job to push the updated SVGs back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip downloads so subsequent runs are faster
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate SVGs
        env:
          # ACCESS_TOKEN must be added in:
          # GitHub repo → Settings → Secrets and variables → Actions → New repository secret
          # Name: ACCESS_TOKEN
          # Value: a fine-grained PAT with repository read + account read permissions
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: zaccesss
        run: python isaacadjei.py

      - name: Commit and push updated SVGs
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add dark_mode.svg light_mode.svg
          git diff --staged --quiet || git commit -m "chore: update profile SVG [automated]"
          git push
